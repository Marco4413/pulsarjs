<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulsar Playground</title>
    <link id="style" rel="stylesheet" href="style.css">
    <script src="script.js" type="module"></script>
    <script
        src="https://marco4413.github.io/static/js/copyright.js"
        url="https://github.com/Marco4413/pulsarjs"
        name="Marco4413"
        year="2026">
    </script>
</head>
<body>
    <div id="console"></div>
    <div>
        <label for="example-picker">Examples&colon;</label>
        <select id="example-picker">
            <option value="">---</option>
            <option value="./examples/hello_world.ntx">Hello World</option>
            <option value="./examples/printf.ntx">Printf</option>
            <option value="./examples/fibonacci.ntx">Fibonacci</option>
            <option value="./examples/tris.ntx">Tris</option>
            <option value="./examples/snake.ntx">Snake</option>
        </select>
    </div>
    <div>
        <label for="script-picker" id="script-label">Script: &lt;Browse...&gt;</label>
        <input style="display: none;" type="file" id="script-picker" accept=".ntx">
    </div>
    <div>
        <input type="checkbox" id="debug">
        <label for="debug">Debug</label>
        <span id="step-buttons">
            <span>| Step&colon;</span>
            <button id="debug-step">Instruction</button>
            <button id="debug-step-over">Over</button>
            <button id="debug-step-into">Into</button>
            <button id="debug-step-out">Out</button>
        </span>
    </div>
    <pre id="report"></pre>
</body>
</html>
